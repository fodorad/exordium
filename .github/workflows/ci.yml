name: CI

# NOTE: macOS is intentionally excluded from the CI matrix.
#
# The root cause is an Objective-C runtime class duplication between the FFmpeg
# dylibs bundled with OpenCV (cv2) and the Homebrew-installed FFmpeg required by
# torchcodec. Specifically, AVFFrameReceiver and AVFAudioReceiver are registered
# twice, which triggers undefined behaviour in the ObjC runtime. In practice this
# causes test hangs, spurious segfaults, and non-deterministic CI failures — roughly
# 3 out of 10 runs fail for reasons unrelated to the actual code under test.
#
# macOS development and testing continues to work correctly via the local Makefile,
# where the environment is more controlled. Linux (ubuntu-latest) remains the
# primary CI target; this is also the production deployment platform.
#
# This restriction will be revisited once a clean solution is identified —
# candidates include shipping a static FFmpeg build with torchcodec, isolating
# the cv2 dylibs in a separate virtual environment, or switching to a macOS
# runner that pre-installs a compatible FFmpeg version without the brew/cv2 clash.

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # required for hatch-vcs git describe

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libgles2 libegl1

    - name: Install dependencies
      run: uv pip install --system -e ".[all,dev,docs]"

    - name: Audit dependencies for vulnerabilities
      run: uvx pip-audit
      continue-on-error: true  # torch/mediapipe may have known CVEs; treat as warning

    - name: Ruff Lint
      run: ruff check .

    - name: Ruff Format
      run: ruff format --check .

    - name: Type check (ty)
      run: ty check exordium

    - name: Test & Coverage
      run: |
        coverage run -m unittest discover -s tests -v
        coverage report
        coverage html
        coverage xml -o coverage.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.13'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        fail_ci_if_error: true

    - name: Upload coverage HTML
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage_html/
      if: always()

    - name: Build docs
      run: sphinx-build -b html docs/ site/
      if: matrix.python-version == '3.13'
